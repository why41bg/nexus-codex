<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Codex Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
          },
        },
      },
    };
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .toast-enter { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body class="h-full bg-gray-50 text-gray-800 antialiased" x-data="app()" x-init="init()" x-cloak>

  <!-- ═══ Auth Screen ═══ -->
  <template x-if="screen === 'auth'">
    <div class="flex min-h-full items-center justify-center px-4">
      <div class="w-full max-w-sm space-y-6 rounded-2xl bg-white p-8 shadow-lg ring-1 ring-gray-200">
        <div class="text-center">
          <h1 class="text-2xl font-bold tracking-tight text-gray-900">Nexus Codex</h1>
          <p class="mt-1 text-sm text-gray-500">输入 API Key 以访问管理面板</p>
        </div>
        <div>
          <input
            type="password"
            x-model="authKey"
            @keydown.enter="login()"
            placeholder="sk-..."
            class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm shadow-sm placeholder:text-gray-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
          />
          <p x-show="authError" class="mt-2 text-sm text-red-600" x-text="authError"></p>
        </div>
        <button
          @click="login()"
          :disabled="authLoading"
          class="flex w-full items-center justify-center rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500/50 disabled:opacity-50"
        >
          <template x-if="authLoading">
            <svg class="mr-2 h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
          </template>
          验证
        </button>
      </div>
    </div>
  </template>

  <!-- ═══ Main Dashboard ═══ -->
  <template x-if="screen === 'main'">
    <div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">

      <!-- Header -->
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold tracking-tight text-gray-900">Nexus Codex</h1>
          <p class="mt-0.5 text-sm text-gray-500">账号池管理面板</p>
        </div>
        <div class="flex items-center gap-3">
          <button @click="refresh()" :disabled="loading" class="inline-flex items-center gap-1.5 rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 disabled:opacity-50">
            <svg class="h-4 w-4" :class="loading && 'animate-spin'" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>
            刷新
          </button>
          <button @click="logout()" class="inline-flex items-center gap-1.5 rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50">
            退出
          </button>
        </div>
      </div>

      <!-- ─── Stats Cards ─── -->
      <div class="mt-6 grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-6">
        <template x-for="card in statsCards" :key="card.label">
          <div class="rounded-xl bg-white p-4 shadow-sm ring-1 ring-gray-200">
            <p class="text-xs font-medium uppercase tracking-wider" :class="card.labelColor" x-text="card.label"></p>
            <p class="mt-2 text-2xl font-bold" :class="card.valueColor" x-text="card.value"></p>
          </div>
        </template>
      </div>

      <!-- ─── Filter Tabs + Table ─── -->
      <div class="mt-8">
        <div class="flex items-center justify-between border-b border-gray-200 pb-3">
          <div class="flex gap-1">
            <template x-for="tab in filterTabs" :key="tab.key">
              <button
                @click="filter = tab.key"
                class="rounded-md px-3 py-1.5 text-sm font-medium transition-colors"
                :class="filter === tab.key ? 'bg-brand-600 text-white shadow-sm' : 'text-gray-600 hover:bg-gray-100'"
                x-text="tab.label + ' (' + tab.count + ')'"
              ></button>
            </template>
          </div>
        </div>

        <!-- Table -->
        <div class="mt-4 overflow-hidden rounded-xl bg-white shadow-sm ring-1 ring-gray-200">
          <!-- Loading -->
          <div x-show="loading && accounts.length === 0" class="flex items-center justify-center py-16">
            <svg class="h-6 w-6 animate-spin text-brand-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
            <span class="ml-2 text-sm text-gray-500">加载中...</span>
          </div>

          <!-- Empty -->
          <div x-show="!loading && filteredAccounts.length === 0" class="py-16 text-center text-sm text-gray-400">
            暂无账号
          </div>

          <!-- Data -->
          <table x-show="filteredAccounts.length > 0" class="w-full text-left text-sm">
            <thead class="border-b border-gray-100 bg-gray-50/60">
              <tr>
                <th class="px-4 py-3 font-medium text-gray-500">状态</th>
                <th class="px-4 py-3 font-medium text-gray-500">ID</th>
                <th class="px-4 py-3 font-medium text-gray-500">备注</th>
                <th class="px-4 py-3 font-medium text-gray-500">CODEX_HOME</th>
                <th class="px-4 py-3 font-medium text-gray-500 text-right">使用次数</th>
                <th class="px-4 py-3 font-medium text-gray-500">最后使用</th>
                <th class="px-4 py-3 font-medium text-gray-500 text-right">操作</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              <template x-for="acc in filteredAccounts" :key="acc.id">
                <tr class="hover:bg-gray-50/50 transition-colors">
                  <!-- Status dot -->
                  <td class="px-4 py-3">
                    <span class="inline-block h-2.5 w-2.5 rounded-full" :class="statusDotClass(acc)"></span>
                    <span class="ml-1.5 text-xs" :class="statusTextClass(acc)" x-text="statusLabel(acc)"></span>
                  </td>
                  <!-- ID -->
                  <td class="px-4 py-3 font-mono text-xs text-gray-600" x-text="acc.id"></td>
                  <!-- Remark -->
                  <td class="px-4 py-3 text-gray-700" x-text="acc.remark || '—'"></td>
                  <!-- CODEX_HOME -->
                  <td class="max-w-[200px] truncate px-4 py-3 font-mono text-xs text-gray-500" :title="acc.codexHome" x-text="acc.codexHome"></td>
                  <!-- Usage -->
                  <td class="px-4 py-3 text-right tabular-nums text-gray-700" x-text="acc.usageCount"></td>
                  <!-- Last used -->
                  <td class="px-4 py-3 text-gray-500 text-xs" x-text="relativeTime(acc.lastUsedAt)"></td>
                  <!-- Actions -->
                  <td class="px-4 py-3 text-right">
                    <div class="flex items-center justify-end gap-2">
                      <button
                        @click="toggleEnabled(acc)"
                        class="rounded-md px-2.5 py-1 text-xs font-medium transition-colors"
                        :class="acc.enabled ? 'bg-amber-50 text-amber-700 hover:bg-amber-100' : 'bg-green-50 text-green-700 hover:bg-green-100'"
                        x-text="acc.enabled ? '禁用' : '启用'"
                      ></button>
                      <button
                        @click="confirmDelete(acc)"
                        class="rounded-md bg-red-50 px-2.5 py-1 text-xs font-medium text-red-700 transition-colors hover:bg-red-100"
                      >删除</button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ─── Add Account Form ─── -->
      <div class="mt-8 rounded-xl bg-white p-6 shadow-sm ring-1 ring-gray-200">
        <h2 class="text-sm font-semibold text-gray-900">添加账号</h2>
        <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-end">
          <div class="flex-1">
            <label class="block text-xs font-medium text-gray-600 mb-1">CODEX_HOME 路径 <span class="text-red-400">*</span></label>
            <input
              type="text"
              x-model="newCodexHome"
              placeholder="/Users/you/.codex-pool/account-x"
              class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm placeholder:text-gray-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
            />
          </div>
          <div class="sm:w-56">
            <label class="block text-xs font-medium text-gray-600 mb-1">备注</label>
            <input
              type="text"
              x-model="newRemark"
              placeholder="email@example.com"
              class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm placeholder:text-gray-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
            />
          </div>
          <button
            @click="addAccount()"
            :disabled="!newCodexHome.trim() || addingAccount"
            class="inline-flex items-center justify-center rounded-lg bg-brand-600 px-5 py-2 text-sm font-semibold text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500/50 disabled:opacity-50"
          >
            <template x-if="addingAccount">
              <svg class="mr-1.5 h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
            </template>
            添加
          </button>
        </div>
      </div>

    </div>
  </template>

  <!-- ═══ Delete Confirm Modal ═══ -->
  <template x-if="deleteTarget">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" @click.self="deleteTarget = null">
      <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl ring-1 ring-gray-200">
        <h3 class="text-base font-semibold text-gray-900">确认删除</h3>
        <p class="mt-2 text-sm text-gray-600">
          确定要删除账号 <span class="font-mono font-semibold" x-text="deleteTarget.id"></span>
          <template x-if="deleteTarget.remark">
            <span>（<span x-text="deleteTarget.remark"></span>）</span>
          </template>
          吗？此操作不可撤销。
        </p>
        <div class="mt-5 flex justify-end gap-3">
          <button @click="deleteTarget = null" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50">取消</button>
          <button @click="doDelete()" :disabled="deleting" class="rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-700 disabled:opacity-50">
            <template x-if="deleting">
              <svg class="mr-1.5 inline h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
            </template>
            删除
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- ═══ Toast Notifications ═══ -->
  <div class="fixed right-4 top-4 z-[60] flex flex-col gap-2">
    <template x-for="t in toasts" :key="t.id">
      <div
        class="toast-enter flex items-center gap-2 rounded-lg px-4 py-2.5 text-sm font-medium shadow-lg"
        :class="t.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'"
      >
        <span x-text="t.message"></span>
      </div>
    </template>
  </div>

  <!-- ═══ App Logic ═══ -->
  <script>
    function app() {
      return {
        // ── State ──
        screen: 'auth',
        authKey: '',
        authError: '',
        authLoading: false,

        loading: false,
        accounts: [],
        dashboard: {},
        filter: 'all',

        newCodexHome: '',
        newRemark: '',
        addingAccount: false,

        deleteTarget: null,
        deleting: false,

        toasts: [],

        // ── Init ──
        async init() {
          const saved = localStorage.getItem('nexus_api_key');
          if (saved) {
            this.authKey = saved;
            await this.login(true);
          } else {
            // Try without key (dev mode, no NEXUS_API_KEYS configured)
            try {
              const res = await fetch('/api/admin/dashboard');
              if (res.ok) {
                this.screen = 'main';
                await this.refresh();
              }
            } catch {}
          }
        },

        // ── Auth ──
        async login(silent = false) {
          this.authError = '';
          this.authLoading = true;
          try {
            const res = await this.api('GET', '/api/admin/dashboard');
            if (res.ok) {
              localStorage.setItem('nexus_api_key', this.authKey);
              this.screen = 'main';
              await this.refresh();
            } else if (res.status === 401) {
              localStorage.removeItem('nexus_api_key');
              if (!silent) this.authError = 'API Key 无效';
              this.screen = 'auth';
            } else {
              if (!silent) this.authError = '连接失败，请检查服务是否运行';
            }
          } catch {
            if (!silent) this.authError = '无法连接到服务';
          } finally {
            this.authLoading = false;
          }
        },

        logout() {
          localStorage.removeItem('nexus_api_key');
          this.authKey = '';
          this.screen = 'auth';
        },

        // ── API helper ──
        async api(method, path, body) {
          const headers = { 'Content-Type': 'application/json' };
          if (this.authKey) headers['Authorization'] = `Bearer ${this.authKey}`;
          const opts = { method, headers };
          if (body) opts.body = JSON.stringify(body);
          return fetch(path, opts);
        },

        // ── Data loading ──
        async refresh() {
          this.loading = true;
          try {
            const [dashRes, accRes] = await Promise.all([
              this.api('GET', '/api/admin/dashboard'),
              this.api('GET', '/api/admin/accounts'),
            ]);
            if (dashRes.status === 401 || accRes.status === 401) {
              this.logout();
              return;
            }
            if (dashRes.ok) this.dashboard = await dashRes.json();
            if (accRes.ok) {
              const data = await accRes.json();
              this.accounts = data.accounts || [];
            }
          } catch {
            this.toast('数据加载失败', 'error');
          } finally {
            this.loading = false;
          }
        },

        // ── Computed-like ──
        get statsCards() {
          const d = this.dashboard;
          return [
            { label: '账号总数', value: d.total ?? '—', labelColor: 'text-gray-500', valueColor: 'text-gray-900' },
            { label: '在线可用', value: d.available ?? '—', labelColor: 'text-green-600', valueColor: 'text-green-700' },
            { label: '当前忙碌', value: d.busy ?? '—', labelColor: 'text-amber-600', valueColor: 'text-amber-700' },
            { label: '不健康', value: d.unhealthy ?? '—', labelColor: 'text-red-600', valueColor: 'text-red-700' },
            { label: '已禁用', value: d.disabled ?? '—', labelColor: 'text-gray-400', valueColor: 'text-gray-500' },
            { label: '总请求数', value: d.totalUsage ?? '—', labelColor: 'text-purple-600', valueColor: 'text-purple-700' },
          ];
        },

        get filterTabs() {
          const counts = { all: this.accounts.length, online: 0, busy: 0, unhealthy: 0, disabled: 0 };
          for (const a of this.accounts) {
            if (!a.enabled) { counts.disabled++; continue; }
            if (a.runtime?.busy) counts.busy++;
            if (!a.runtime?.healthy) counts.unhealthy++;
            else if (!a.runtime?.busy) counts.online++;
          }
          return [
            { key: 'all', label: '全部', count: counts.all },
            { key: 'online', label: '在线', count: counts.online },
            { key: 'busy', label: '忙碌', count: counts.busy },
            { key: 'unhealthy', label: '不健康', count: counts.unhealthy },
            { key: 'disabled', label: '已禁用', count: counts.disabled },
          ];
        },

        get filteredAccounts() {
          if (this.filter === 'all') return this.accounts;
          return this.accounts.filter((a) => {
            if (this.filter === 'disabled') return !a.enabled;
            if (!a.enabled) return false;
            if (this.filter === 'busy') return a.runtime?.busy;
            if (this.filter === 'unhealthy') return !a.runtime?.healthy;
            if (this.filter === 'online') return a.runtime?.healthy && !a.runtime?.busy;
            return true;
          });
        },

        // ── Status helpers ──
        statusDotClass(acc) {
          if (!acc.enabled) return 'bg-gray-400';
          if (acc.runtime?.busy) return 'bg-amber-400';
          if (!acc.runtime?.healthy) return 'bg-red-500';
          return 'bg-green-500';
        },
        statusTextClass(acc) {
          if (!acc.enabled) return 'text-gray-400';
          if (acc.runtime?.busy) return 'text-amber-600';
          if (!acc.runtime?.healthy) return 'text-red-600';
          return 'text-green-600';
        },
        statusLabel(acc) {
          if (!acc.enabled) return '已禁用';
          if (acc.runtime?.busy) return '忙碌';
          if (!acc.runtime?.healthy) return '不健康';
          return '空闲';
        },

        // ── Time formatting ──
        relativeTime(iso) {
          if (!iso) return '从未使用';
          const diff = Date.now() - new Date(iso).getTime();
          const s = Math.floor(diff / 1000);
          if (s < 60) return '刚刚';
          const m = Math.floor(s / 60);
          if (m < 60) return `${m} 分钟前`;
          const h = Math.floor(m / 60);
          if (h < 24) return `${h} 小时前`;
          const d = Math.floor(h / 24);
          return `${d} 天前`;
        },

        // ── Actions ──
        async toggleEnabled(acc) {
          const newEnabled = !acc.enabled;
          try {
            const res = await this.api('PATCH', `/api/admin/accounts/${acc.id}`, { enabled: newEnabled });
            if (res.ok) {
              this.toast(newEnabled ? `已启用 ${acc.id}` : `已禁用 ${acc.id}`, 'success');
              await this.refresh();
            } else {
              const data = await res.json();
              this.toast(data.error?.message || '操作失败', 'error');
            }
          } catch {
            this.toast('请求失败', 'error');
          }
        },

        confirmDelete(acc) {
          this.deleteTarget = acc;
        },

        async doDelete() {
          if (!this.deleteTarget) return;
          this.deleting = true;
          try {
            const res = await this.api('DELETE', `/api/admin/accounts/${this.deleteTarget.id}`);
            if (res.ok) {
              this.toast(`已删除 ${this.deleteTarget.id}`, 'success');
              this.deleteTarget = null;
              await this.refresh();
            } else {
              const data = await res.json();
              this.toast(data.error?.message || '删除失败', 'error');
            }
          } catch {
            this.toast('请求失败', 'error');
          } finally {
            this.deleting = false;
          }
        },

        async addAccount() {
          if (!this.newCodexHome.trim()) return;
          this.addingAccount = true;
          try {
            const res = await this.api('POST', '/api/admin/accounts', {
              codexHome: this.newCodexHome.trim(),
              remark: this.newRemark.trim(),
            });
            if (res.ok) {
              this.toast('账号添加成功', 'success');
              this.newCodexHome = '';
              this.newRemark = '';
              await this.refresh();
            } else {
              const data = await res.json();
              this.toast(data.error?.message || '添加失败', 'error');
            }
          } catch {
            this.toast('请求失败', 'error');
          } finally {
            this.addingAccount = false;
          }
        },

        // ── Toast ──
        toast(message, type = 'success') {
          const id = Date.now();
          this.toasts.push({ id, message, type });
          setTimeout(() => {
            this.toasts = this.toasts.filter((t) => t.id !== id);
          }, 3000);
        },
      };
    }
  </script>
</body>
</html>
